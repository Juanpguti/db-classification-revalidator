services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: meli-mailhog
    ports:
      - "8025:8025"   # Interfaz web para ver los emails: http://localhost:8025
      - "1025:1025"   # Puerto SMTP

  app:
    build: .
    container_name: meli-revalidation
    depends_on:
      - mailhog
    environment:
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    volumes:
      - ./output:/app/output   # La base SQLite queda accesible en ./output
